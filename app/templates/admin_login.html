<script type="text/javascript">
       $( document ).ready(function() {

          $("#btn_submit").click(function() {

            if($("#selRole").val() == "") {
               alert("Please Select Role");
               $("#selRole").focus();
               return false;
            }

            if($("#txtEmail").val() == "") {
               alert("Please Enter Email");
               $("#txtEmail").focus();
               return false;
            }

            if($("#txtPassword").val() == "") {
               alert("Please Enter Password");
               $("#txtPassword").focus();
               return false;
            }

            // alert("alert");
            var formData = new FormData();
            formData.append("txtEmail", $("#txtEmail").val());
            formData.append("txtPassword", $("#txtPassword").val());
            formData.append("selRole", $("#selRole").val());
            formData.append("csrfmiddlewaretoken", $('input[name=csrfmiddlewaretoken]').val());


            $.ajax({ 
              url: "/check_admin_login/",
              type: "POST",
              data: formData,
              processData: false,
              contentType: false,
              success: function(result) {

               if(result == '0') {
                    alert("Invalid Email OR Password");
                  } else {

                    if(result == "Admin") {
                      window.location = "/admin/";
                    } 
                    else if(result == "Seller") {
                      window.location = "/seller_products/";
                    }
                  
                }
              }

            });
       
          });

      });

        const stopBrowserBack = callback => {
        window.history.pushState(null, "", window.location.href);
          window.onpopstate = () => {
            window.history.pushState(null, "", window.location.href);
            callback();
          };
        };

</script>

<script type="text/javascript">
    $(document).ready(function() {
        $("#showPassword").change(function(){
            $(this).prop("checked") ?  $("#txtPassword").prop("type", "text") : $("#txtPassword").prop("type", "password");    
        });
    });
</script>
