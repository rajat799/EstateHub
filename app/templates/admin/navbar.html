<style>
.dm-toggle-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.3s ease;
    outline: none;
    padding: 0;
    line-height: 1;
}
.dm-toggle-btn:hover {
    border-color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.25);
    transform: scale(1.1);
}
html.dark-mode .dm-toggle-btn {
    border-color: rgba(99,102,241,0.6);
    background: rgba(79,70,229,0.2);
}
</style>

<script>
(function () {
    var STORAGE_KEY = 'estatehub_dark_mode';
    var DARK_CLASS  = 'dark-mode';

    // Apply saved theme right away
    if (localStorage.getItem(STORAGE_KEY) === 'true') {
        document.documentElement.classList.add(DARK_CLASS);
    }

    function updateIcon() {
        var btn = document.getElementById('darkModeToggle');
        if (!btn) return;
        var isDark = document.documentElement.classList.contains(DARK_CLASS);
        btn.innerHTML = isDark ? '🌙' : '☀️';
        btn.title = isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode';
    }

    function toggleDark() {
        var isDark = document.documentElement.classList.toggle(DARK_CLASS);
        localStorage.setItem(STORAGE_KEY, isDark ? 'true' : 'false');
        updateIcon();
    }

    document.addEventListener('DOMContentLoaded', function () {
        updateIcon();
        var btn = document.getElementById('darkModeToggle');
        if (btn) btn.addEventListener('click', toggleDark);
    });

    window.toggleDarkMode = toggleDark;
})();
</script>
