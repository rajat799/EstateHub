{% csrf_token %}
<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Tell the browser to be responsive to screen width -->
   <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="keywords"
        content="">
    <meta name="description"
        content="">
    <meta name="robots" content="noindex,nofollow">
    <title> EstateHub</title>
    <!-- Favicon icon -->
    <link rel="icon" type="/static/admin/image/png" sizes="16x16" href="plugins/images/favicon.png">
    <!-- Custom CSS -->
   <link href="/static/admin/css/style.min.css" rel="stylesheet">
   <!-- Dark Mode CSS -->
   <link href="/static/web/css/darkmode.css" rel="stylesheet">
   <!-- Dark Mode JS - loaded early to prevent flash -->
   <script src="/static/web/js/darkmode.js"></script>

   <style type="text/css">
       .logo-text {
            color: black !important;
            font-weight: 900 !important;
            margin: auto;
        }
       /* Admin/Seller dark mode extras */
       html.dark-mode #main-wrapper,
       html.dark-mode .page-wrapper {
           background-color: #0f172a !important;
       }
       html.dark-mode .left-sidebar,
       html.dark-mode .scroll-sidebar {
           background-color: #1e293b !important;
       }
       html.dark-mode .sidebar-nav ul,
       html.dark-mode .sidebar-nav li a,
       html.dark-mode .sidebar-link {
           background-color: #1e293b !important;
           color: #94a3b8 !important;
       }
       html.dark-mode .sidebar-link:hover,
       html.dark-mode .sidebar-link.active {
           background-color: #263548 !important;
           color: #00B98E !important;
       }
       html.dark-mode .sidebar-link .hide-menu { color: inherit !important; }
       html.dark-mode .topbar { background-color: #1e293b !important; }
       html.dark-mode .page-breadcrumb.bg-white {
           background-color: #1e293b !important;
           border-bottom: 1px solid #334155 !important;
       }
       html.dark-mode .white-box {
           background-color: #1e293b !important;
           box-shadow: 0 4px 20px rgba(0,0,0,0.35) !important;
       }
       html.dark-mode footer.footer {
           background-color: #1e293b !important;
           color: #94a3b8 !important;
           border-top: 1px solid #334155 !important;
       }
       html.dark-mode .preloader { background-color: #0f172a !important; }
   </style>
</head>

<body>
    <!-- ============================================================== -->
    <!-- Preloader - style you can find in spinners.css -->
    <!-- ============================================================== -->
    <div class="preloader">
        <div class="lds-ripple">
            <div class="lds-pos"></div>
            <div class="lds-pos"></div>
        </div>
    </div>
    <!-- ============================================================== -->
    <!-- Main wrapper - style you can find in pages.scss -->
    <!-- ============================================================== -->
    <div id="main-wrapper" data-layout="vertical" data-navbarbg="skin5" data-sidebartype="full"
        data-sidebar-position="absolute" data-header-position="absolute" data-boxed-layout="full">
        <!-- ============================================================== -->
        <!-- Topbar header - style you can find in pages.scss -->
        <!-- ============================================================== -->
        {% include "seller/navbar.html" %}
        <!-- ============================================================== -->
        <!-- End Topbar header -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Left Sidebar - style you can find in sidebar.scss  -->
        <!-- ============================================================== -->
        <aside class="left-sidebar" data-sidebarbg="skin6">
            <!-- Sidebar scroll-->
            <div class="scroll-sidebar">
                <!-- Sidebar navigation-->
                <nav class="sidebar-nav">
                    <ul id="sidebarnav">
                        <!-- User Profile-->
                        <li class="sidebar-item">
                            <a class="sidebar-link waves-effect waves-dark sidebar-link" href="/seller_booking/"
                                aria-expanded="false">
                                <i class="fa fa-user" aria-hidden="true"></i>
                                <span class="hide-menu">Booking</span>
                            </a>
                        </li>

                        <li class="sidebar-item">
                            <a class="sidebar-link waves-effect waves-dark sidebar-link" href="/category/"
                                aria-expanded="false">
                                <i class="fa fa-user" aria-hidden="true"></i>
                                <span class="hide-menu">Category</span>
                            </a>
                        </li>

                        <li class="sidebar-item">
                            <a class="sidebar-link waves-effect waves-dark sidebar-link" href="/propertiess/"
                                aria-expanded="false">
                                <i class="fa fa-user" aria-hidden="true"></i>
                                <span class="hide-menu">Propertiess</span>
                            </a>
                        </li>
                        <!-- <li class="sidebar-item">
                            <a class="sidebar-link waves-effect waves-dark sidebar-link" href="/products/"
                                aria-expanded="false">
                                <i class="fa fa-user" aria-hidden="true"></i>
                                <span class="hide-menu">Product</span>
                            </a>
                        </li> -->

                        <li class="sidebar-item">
                            <a class="sidebar-link waves-effect waves-dark sidebar-link" href="/profile/"
                                aria-expanded="false">
                                <i class="fa fa-user" aria-hidden="true"></i>
                                <span class="hide-menu">Profile</span>
                            </a>
                        </li>
                        
                    </ul>

                </nav>
                <!-- End Sidebar navigation -->
            </div>
            <!-- End Sidebar scroll-->
        </aside>
        <!-- ============================================================== -->
        <!-- End Left Sidebar - style you can find in sidebar.scss  -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Page wrapper  -->
        <!-- ============================================================== -->
        <div class="page-wrapper">
            <!-- ============================================================== -->
            <!-- Bread crumb and right sidebar toggle -->
            <!-- ============================================================== -->
            <div class="page-breadcrumb bg-white">
                <div class="row align-items-center">
                    <div class="col-lg-3 col-md-4 col-sm-4 col-xs-12">
                        <h4 class="page-title">Profile page</h4>
                    </div>
                    <div class="col-lg-9 col-sm-8 col-md-8 col-xs-12">
                        <div class="d-md-flex">
                            <ol class="breadcrumb ms-auto">
                                <li><a href="#" class="fw-normal"></a></li>
                            </ol>
                        </div>
                    </div>
                </div>
                <!-- /.col-lg-12 -->
            </div>
            <div class="container-fluid">
                    <div class="col-lg-8 col-xlg-9 col-md-12">
                        <div class="card">
                            <div class="card-body">
                                <form class="form-horizontal form-material">
                                    <input type="hidden" id="edit_id">
                                    <div class="form-group mb-4">
                                        <label class="col-md-12 p-0">Name</label>
                                        <div class="col-md-12 border-bottom p-0">
                                            <input type="text" placeholder="Johnathan Doe"
                                                class="form-control p-0 border-0" id="txtName"> </div>
                                    </div>
                                    <div class="form-group mb-4">
                                        <label for="example-email" class="col-md-12 p-0">Email</label>
                                        <div class="col-md-12 border-bottom p-0">
                                            <input type="email" placeholder="johnathan@admin.com"
                                                class="form-control p-0 border-0" name="example-email"
                                                id="txtEmail">
                                        </div>
                                    </div>
                                    <div class="form-group mb-4">
                                        <label class="col-md-12 p-0">Password</label>
                                        <div class="col-md-12 border-bottom p-0">
                                            <input type="password" value="password" class="form-control p-0 border-0" id="txtPassword">
                                            <input type="checkbox" id="showPassword"> Show Password
                                        </div>
                                    </div>
                                    <div class="form-group mb-4">
                                        <label class="col-md-12 p-0">Mobile No</label>
                                        <div class="col-md-12 border-bottom p-0">
                                            <input type="text" placeholder="123 456 7890"
                                                class="form-control p-0 border-0" id="txtMobileNo" maxlength="10">
                                        </div>
                                    </div>
                                    
                                    </div>
                                    <div class="form-group mb-4">
                                        <div class="col-sm-12 text-center">
                                            <button type="button" class="btn btn-success" id="btn_update">Update Profile</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <!-- Column -->
                </div>

            </div>

            <footer class="footer text-center"> 2024 ©  Property 
            </footer>
        </div>
    </div>

    <script src="/static/admin/plugins/bower_components/jquery/dist/jquery.min.js"></script>
    <!-- Bootstrap tether Core JavaScript -->
    <script src="/static/admin/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/admin/js/app-style-switcher.js"></script>
    <!--Wave Effects -->
    <script src="/static/admin/js/waves.js"></script>
    <!--Menu sidebar -->
    <script src="/static/admin/js/sidebarmenu.js"></script>
    <!--Custom JavaScript -->
    <script src="/static/admin/js/custom.js"></script>
    <script src="/static/seller/js/jsProfile.js"></script>
</body>

</html>

<script type="text/javascript">
    $(document).ready(function() {
        $("#showPassword").change(function(){
            $(this).prop("checked") ?  $("#txtPassword").prop("type", "text") : $("#txtPassword").prop("type", "password");    
        });
    });
</script>
