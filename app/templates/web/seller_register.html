<script type="text/javascript">

    function validateEmail(paramEmailID) {
        var filter = /^[0-9a-z.]+\@[a-z0-9]+\.[a-zA-z0-9]{2,4}$/;

        if (filter.test(paramEmailID)) {
            return true;
        } else {
            return false;
        }
    }
    function alphaOnly(event) {
        var key = event.which ? event.which : event.keyCode;
        return (
            (key >= 65 && key <= 90) ||
            key == 8 ||
            (event.charCode >= 97 && event.charCode <= 122) ||
            event.charCode == 32
        );
    }
    function isNumberKey(evt) {
        var charCode = (evt.which) ? evt.which : event.keyCode;
        if (charCode > 31 && (charCode < 48 || charCode > 57)) {
            return false;
        }
        return true;
    }
    $(document).ready(function () {

        $("#btn_submit").click(function () {

            if ($("#txtName").val() == "") {
                alert("Please Enter Name");
                $("#txtName").focus();
                return false;
            }

            if ($("#txtEmail").val() == "") {
                alert("Please Enter Email");
                $("#txtEmail").focus();
                return false;
            }

            if (!validateEmail($("#txtEmail").val())) {
                alert("Please Enter Valid Email");
                $("#txtEmail").focus();
                return false;
            }
            if ($("#txtMobile").val().trim().length < 10) {
                alert("Please Enter Mobile Number");
                $("#txtMobile").focus();
                return false;
            }

            let arr = ['9','8','7','6'];
           let numberExist = arr.indexOf($("#txtMobile").val().substring(0,1))
           // alert(numberExist);

           if(numberExist == -1) {
               alert("Please Enter Valid Mobile Number");
               return false;
           }

            if ($("#txtPassword").val() == "") {
                alert("Please Enter Password");
                $("#txtPassword").focus();
                return false;
            }

            // pass = document.getElementById("txtPassword").value;
            // console.log(pass);
            // regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            // if (regex.exec(pass) == null) {
            //  alert('Please Enter Valid Password Format');
            //   return false;
            // }

            // alert("alert");
            var formData = new FormData();
            formData.append("txtName", $("#txtName").val());
            formData.append("txtEmail", $("#txtEmail").val());
            formData.append("txtMobile", $("#txtMobile").val());
            formData.append("txtPassword", $("#txtPassword").val());
            formData.append("csrfmiddlewaretoken", $('input[name=csrfmiddlewaretoken]').val());
            formData.append("action", "add");

            // var table = $("#dataTables-example").DataTable();

            $.ajax({
                beforeSend: function () {
                    $(".btn .spinner-border").show();
                    $("#btn_submit").attr("disabled", true);
                },
                url: "/seller_register/",
                type: "POST",
                // headers: {'X-CSRFToken': '{{ csrf_token }}'},
                data: formData,
                processData: false,
                contentType: false,
                success: function (response) {
                    // Handle both JSON response (new) and plain text (old) formats
                    if (typeof response === 'object') {
                        // New JSON format
                        if (response.status === 'success') {
                            alert(response.message || "Seller Registered Successfully");
                            window.location = '/admin_login/';
                        } else {
                            alert(response.message || "Registration failed");
                        }
                    } else if (response == "10") {
                        alert("You are already Registered Seller, Please Login");
                    } else {
                        alert("Seller Registered Successfully");
                        window.location = '/admin_login/';
                    }
                },
                error: function (request, error) {
                    console.error(error);
                },
                complete: function () {
                    $(".btn .spinner-border").hide();
                    $("#btn_submit").attr("disabled", false);
                },
            });
        });
    });
    
    $(document).ready(function() {
        $("#showPassword").change(function(){
            $(this).prop("checked") ?  $("#txtPassword").prop("type", "text") : $("#txtPassword").prop("type", "password");    
        });
    });

</script>
