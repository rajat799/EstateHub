<script type="text/javascript">
    $("#btn_login").click(function (e) {
    //verification
  
        if ($("#txtPassword").val() == "") {
          alert("Please Enter Password");
          $("#txtPassword").focus();
          return false;
        }

        if ($("#txtPassword").val().trim().length < 5) {
          alert("Password length should not be less than 5");
          $("#txtPassword").focus();
          return false;
        }

        if ($("#txtConfirmPassword").val() == "") {
          alert("Please Enter Confirm Password");
          $("#txtConfirmPassword").focus();
          return false;
        }

        if ($("#txtPassword").val() != $("#txtConfirmPassword").val()) {
          alert("Please Enter Password same as Confirm Password");
          $("#txtConfirmPassword").focus();
          return false;
        }
  
      let formData = new FormData();  
  
      formData.append("txtPassword", $("#txtPassword").val());
      formData.append("csrfmiddlewaretoken", $('input[name=csrfmiddlewaretoken]').val());
      formData.append("action", "add");
  
    // var table = $("#tableData").DataTable();
  
    $.ajax({
      beforeSend: function () {
        $(".btn .spinner-border").show();
        $("#btn_login").attr("disabled", true);
      },
      url: "/update_password/",
      type: "POST",
      data: formData,
      processData: false,
      contentType: false,
      success: function (result) {
           alert("Password Updated Successfully");
           if (result.trim() === "seller") {
               window.location = "/admin_login/";
           } else {
               window.location = "/web_login/";
           }
      },
      error: function (request, error) {
        console.error(error);
      },
      complete: function () {
        $(".btn .spinner-border").hide();
        $("#btn_login").attr("disabled", false);
      },
    });
  });
  </script>

<script type="text/javascript">
    $(document).ready(function() {
        $("#showPassword").change(function(){
            $(this).prop("checked") ?  $("#txtPassword").prop("type", "text") : $("#txtPassword").prop("type", "password");    
        });
    });
</script>
